<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dino Kucing 🌸</title>
<style>
  :root{--pink-1:#fff0f5;--pink-2:#ffd6e8;--pink-3:#ff9ebb;--pink-4:#ff6fa5;--pink-dark:#d63e79;--text:#5c2a3d;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',sans-serif;background:linear-gradient(160deg,var(--pink-1),var(--pink-2) 60%,var(--pink-3));min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text);padding:16px;user-select:none;}
  h1{font-size:20px;color:var(--pink-dark);margin-bottom:4px;text-align:center;}
  .sub{font-size:12px;color:#a1526f;margin-bottom:16px;text-align:center;}
  #gameWrap{background:rgba(255,255,255,0.85);border-radius:20px;box-shadow:0 8px 28px rgba(214,62,121,0.2);padding:16px;width:100%;max-width:480px;}
  canvas{display:block;width:100%;border-radius:12px;background:#fff8fb;border:2px solid var(--pink-2);touch-action:none;}
  #score{text-align:center;margin-top:10px;font-size:14px;font-weight:700;color:var(--pink-dark);}
  #msg{text-align:center;margin-top:8px;font-size:13px;color:#b45a7e;min-height:20px;}
  .btn-row{display:flex;justify-content:center;gap:10px;margin-top:12px;}
  .btn{padding:10px 24px;border:none;border-radius:999px;background:var(--pink-4);color:#fff;font-weight:700;font-size:13px;cursor:pointer;}
  .btn:active{transform:scale(0.95);}
  .back-btn{padding:10px 24px;border:none;border-radius:999px;background:var(--pink-2);color:var(--pink-dark);font-weight:700;font-size:13px;cursor:pointer;}
  .tip{font-size:11px;color:#c17b95;text-align:center;margin-top:8px;}
  #jumpBtn{display:none;width:100%;margin-top:14px;padding:20px;border:none;border-radius:18px;background:var(--pink-4);color:#fff;font-weight:700;font-size:18px;cursor:pointer;-webkit-tap-highlight-color:transparent;letter-spacing:.5px;}
  #jumpBtn:active{background:var(--pink-dark);transform:scale(0.97);}
  @media(pointer:coarse){#jumpBtn{display:block;}}
</style>
</head>
<body>
<h1>🌸 Dino Kucing 🌸</h1>
<p class="sub">Lompati rintangan! Tekan spasi / tombol loncat~</p>
<div id="gameWrap">
  <canvas id="c" height="160"></canvas>
  <div id="score">🌸 Skor: 0</div>
  <div id="msg">Tekan Spasi atau tombol Loncat untuk mulai!</div>
  <button id="jumpBtn" onclick="jump()">🐾 Loncat!</button>
  <div class="btn-row">
    <button class="btn" onclick="restartGame()">🔄 Main Lagi</button>
    <button class="back-btn" onclick="location.href='games.html'">← Kembali</button>
  </div>
  <p class="tip">💡 HP: pakai tombol Loncat di atas · PC: tekan Spasi</p>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 480, H = 160;
canvas.width = W; canvas.height = H;

const GROUND_Y = H - 30;
const DINO_H = 36, DINO_W = 28;
const GRAVITY = 0.65;
const JUMP_V = -13;

let dino, obstacles, score, speed, frame, gameRunning, gameOver, animId;

/* ── AUDIO ── */
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(freq, type, duration, vol) {
  try {
    const ac = getAudioCtx();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, ac.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.9, ac.currentTime + duration);
    gain.gain.setValueAtTime(vol || 0.15, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + duration);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + duration);
  } catch(e) {}
}
function sfxJump()   { playTone(520, 'sine',   0.12, 0.13); }
function sfxScore()  { playTone(880, 'sine',   0.08, 0.12); setTimeout(()=>playTone(1100,'sine',0.1,0.12), 80); }
function sfxDead()   {
  playTone(400, 'sawtooth', 0.12, 0.18);
  setTimeout(()=>playTone(300,'sawtooth',0.12,0.18), 120);
  setTimeout(()=>playTone(200,'sawtooth',0.2, 0.18), 240);
}
function sfxSpeed()  { playTone(660,'square',0.06,0.08); setTimeout(()=>playTone(780,'square',0.06,0.08),70); }

/* ── INIT ── */
function initGame() {
  dino = { x: 55, y: GROUND_Y - DINO_H, vy: 0, onGround: true };
  obstacles = [];
  score = 0; speed = 4; frame = 0;
  gameRunning = false; gameOver = false;
  cancelAnimationFrame(animId);
  render();
  document.getElementById('score').textContent = '🌸 Skor: 0';
  document.getElementById('msg').textContent = 'Tekan Spasi atau tombol Loncat untuk mulai!';
}

/* ── JUMP ── */
function jump() {
  if (gameOver) { restartGame(); return; }
  if (!gameRunning) { startGame(); return; }
  if (dino.onGround) {
    dino.vy = JUMP_V;
    dino.onGround = false;
    sfxJump();
  }
}

function startGame() {
  gameRunning = true;
  document.getElementById('msg').textContent = '';
  dino.vy = JUMP_V;
  dino.onGround = false;
  sfxJump();
  loop();
}

/* ── GAME LOOP ── */
function loop() {
  frame++;

  if (!obstacles.length || obstacles[obstacles.length - 1].x < W - (260 + Math.random() * 180)) {
    if (frame > 80) spawnObstacle();
  }

  dino.vy += GRAVITY;
  dino.y += dino.vy;
  if (dino.y >= GROUND_Y - DINO_H) {
    dino.y = GROUND_Y - DINO_H;
    dino.vy = 0;
    dino.onGround = true;
  }

  obstacles.forEach(o => o.x -= speed);
  obstacles = obstacles.filter(o => o.x + o.w > 0);

  const dx = 4, dy = 4;
  const dLeft = dino.x + dx, dRight = dino.x + DINO_W - dx;
  const dTop  = dino.y + dy, dBot   = dino.y + DINO_H - dy;
  for (const o of obstacles) {
    if (dRight > o.x + 2 && dLeft < o.x + o.w - 2 && dBot > o.y + 2 && dTop < o.y + o.h) {
      endGame(); return;
    }
  }

  if (frame % 6 === 0) {
    score++;
    document.getElementById('score').textContent = '🌸 Skor: ' + score;
    if (score % 15 === 0) {
      speed = Math.min(11, speed + 0.4);
      sfxSpeed();
    }
    if (score % 5 === 0 && score % 15 !== 0) sfxScore();
  }

  render();
  animId = requestAnimationFrame(loop);
}

/* ── SPAWN ── */
function spawnObstacle() {
  const h = 28 + Math.random() * 22;
  obstacles.push({ x: W + 10, y: GROUND_Y - h, w: 26, h });
}

/* ── RENDER ── */
function render() {
  ctx.fillStyle = '#ffeef5';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ffb6d6';
  [[60,18],[150,32],[280,14],[380,26],[440,38],[100,9],[320,40]].forEach(([x,y]) => {
    ctx.beginPath(); ctx.arc(x, y, 1.8, 0, Math.PI*2); ctx.fill();
  });
  ctx.fillStyle = '#ffb6d6';
  ctx.fillRect(0, GROUND_Y, W, 4);
  ctx.fillStyle = '#ff9ebb';
  for (let i = 0; i < W; i += 28) ctx.fillRect(i, GROUND_Y + 4, 14, 2);
  obstacles.forEach(drawMushroom);
  drawCat();
}

function drawMushroom(o) {
  const cx = o.x + o.w / 2;
  ctx.fillStyle = '#c43569';
  ctx.beginPath(); ctx.roundRect(cx - 5, o.y + 12, 10, o.h - 12, 3); ctx.fill();
  ctx.fillStyle = '#ff6fa5';
  ctx.beginPath(); ctx.arc(cx, o.y + 13, 15, Math.PI, 0); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  [[0,0],[7,5],[-7,5]].forEach(([dx, dy]) => {
    ctx.beginPath(); ctx.arc(cx + dx, o.y + 10 + dy, 3, Math.PI, 0); ctx.fill();
  });
}

function drawCat() {
  const x = dino.x, y = dino.y;
  ctx.fillStyle = '#ff9ebb';
  ctx.beginPath(); ctx.roundRect(x - 10, y + 16, 13, 7, 4); ctx.fill();
  ctx.fillStyle = '#ff6fa5';
  ctx.beginPath(); ctx.roundRect(x, y + 10, DINO_W, 26, 6); ctx.fill();
  ctx.fillStyle = '#ff9ebb';
  ctx.beginPath(); ctx.roundRect(x + 3, y, 22, 18, 8); ctx.fill();
  ctx.fillStyle = '#ff6fa5';
  ctx.beginPath(); ctx.roundRect(x + 4, y - 7, 6, 10, 3); ctx.fill();
  ctx.beginPath(); ctx.roundRect(x + 17, y - 7, 6, 10, 3); ctx.fill();
  ctx.fillStyle = '#ffc0d8';
  ctx.beginPath(); ctx.roundRect(x + 5, y - 5, 4, 7, 2); ctx.fill();
  ctx.beginPath(); ctx.roundRect(x + 18, y - 5, 4, 7, 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x + 10, y + 8, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 20, y + 8, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5c2a3d';
  ctx.beginPath(); ctx.arc(x + 11, y + 8, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x + 21, y + 8, 2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#d63e79';
  ctx.beginPath(); ctx.arc(x + 14, y + 13, 2, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#d63e79'; ctx.lineWidth = 1;
  [[x+7, y+13, x+2, y+11],[x+7, y+14, x+2, y+15],
   [x+21, y+13, x+26, y+11],[x+21, y+14, x+26, y+15]].forEach(([x1,y1,x2,y2]) => {
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  });
  const legOff = (dino.onGround && gameRunning) ? (Math.floor(frame / 7) % 2) * 5 : 0;
  ctx.fillStyle = '#ff6fa5';
  ctx.beginPath(); ctx.roundRect(x + 4,  y + 34, 8, 8 + legOff, 3); ctx.fill();
  ctx.beginPath(); ctx.roundRect(x + 16, y + 34, 8, 8 + (5 - legOff), 3); ctx.fill();
}

/* ── END / RESTART ── */
function endGame() {
  gameRunning = false; gameOver = true;
  cancelAnimationFrame(animId);
  sfxDead();
  render();
  const x = dino.x, y = dino.y;
  ctx.strokeStyle = '#d63e79'; ctx.lineWidth = 2;
  [[x+7,y+5,x+13,y+11],[x+13,y+5,x+7,y+11],
   [x+17,y+5,x+23,y+11],[x+23,y+5,x+17,y+11]].forEach(([x1,y1,x2,y2]) => {
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  });
  document.getElementById('msg').textContent = '💔 Aduh! Skor: ' + score + ' — Tap Loncat / Spasi untuk main lagi~';
}

function restartGame() { initGame(); }

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); jump(); }
});

initGame();
</script>
</body>
</html>

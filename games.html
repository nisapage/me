<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Games Nisa 🎮</title>
<style>
  :root{--pink-1:#fff0f5;--pink-2:#ffd6e8;--pink-3:#ff9ebb;--pink-4:#ff6fa5;--pink-dark:#d63e79;--text:#5c2a3d;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',sans-serif;background:linear-gradient(160deg,var(--pink-1),var(--pink-2) 60%,var(--pink-3));min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text);padding:24px;}
  .card{background:rgba(255,255,255,0.88);border-radius:22px;padding:28px 22px;box-shadow:0 10px 30px rgba(214,62,121,0.2);width:100%;max-width:360px;}
  .emoji{text-align:center;font-size:38px;margin-bottom:8px;}
  h1{text-align:center;font-size:20px;color:var(--pink-dark);margin-bottom:4px;}
  .sub{text-align:center;font-size:12.5px;color:#a1526f;margin-bottom:24px;}
  .game-btn{display:flex;align-items:center;gap:14px;width:100%;padding:16px 18px;border:none;border-radius:16px;background:linear-gradient(135deg,#fff,var(--pink-1));color:var(--pink-dark);font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(255,111,165,0.2);margin-bottom:12px;transition:transform .15s,box-shadow .15s;text-decoration:none;}
  .game-btn:active{transform:scale(0.97);}
  .game-ic{font-size:30px;width:42px;text-align:center;}
  .game-info{text-align:left;}
  .game-title{font-size:15px;font-weight:700;color:var(--pink-dark);}
  .game-desc{font-size:11.5px;color:#b45a7e;font-weight:400;margin-top:2px;}
  .back-btn{display:block;width:100%;margin-top:6px;padding:12px;border:none;border-radius:14px;background:var(--pink-2);color:var(--pink-dark);font-weight:700;font-size:13px;cursor:pointer;text-align:center;text-decoration:none;}
  .back-btn:active{background:var(--pink-3);}
</style>
</head>
<body>
<div class="card">
  <div class="emoji">🎮</div>
  <h1>Mini Games</h1>
  <p class="sub">Pilih game yang mau dimainkan~</p>

  <a class="game-btn" href="dino.html">
    <span class="game-ic">🐱</span>
    <div class="game-info">
      <div class="game-title">Dino</div>
      <div class="game-desc">Loncat Hap-Hap! Tap / tekan Spasi</div>
    </div>
  </a>

  <a class="game-btn" href="snake.html">
    <span class="game-ic">🐍</span>
    <div class="game-info">
      <div class="game-title">Ular Nokia</div>
      <div class="game-desc">Terus makan jangan sampai nabrak! Pakai D-pad / panah</div>
    </div>
  </a>

  <a class="back-btn" href="index.html">← Kembali ke Homepage</a>
</div>
</body>
</html>
